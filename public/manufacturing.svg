<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="mfg_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b2e2b" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" rx="24" fill="url(#mfg_bg)" />
  
  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="450" x2="800" y2="450" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="400" y1="0" x2="400" y2="600" />
    <line x1="600" y1="0" x2="600" y2="600" />
  </g>

  <!-- Factory/Manufacturing gear & conveyor illustration -->
  <g transform="translate(330, 190)">
    <circle cx="70" cy="70" r="50" fill="none" stroke="#34d399" stroke-width="8" stroke-dasharray="16 8"/>
    <circle cx="70" cy="70" r="25" fill="#065f46" stroke="#6ee7b7" stroke-width="4"/>
    <path d="M20 170 h100 v20 h-100 z" fill="#10b981"/>
    <rect x="35" y="130" width="20" height="40" rx="4" fill="#6ee7b7"/>
    <rect x="85" y="130" width="20" height="40" rx="4" fill="#6ee7b7"/>
  </g>

  <rect x="230" y="440" width="340" height="50" rx="12" fill="#022c22" fill-opacity="0.7" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="471" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#6ee7b7" text-anchor="middle">
    STATE-OF-THE-ART MANUFACTURING
  </text>
