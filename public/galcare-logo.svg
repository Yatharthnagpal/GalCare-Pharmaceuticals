<svg xmlns="http://www.w3.org/2000/svg" width="220" height="50" viewBox="0 0 220 50" fill="none">
  <defs>
    <linearGradient id="galcare_light_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>

  <!-- White Circle Icon with Teal Medical Emblem -->
  <g transform="translate(4, 5)">
    <circle cx="20" cy="20" r="19" fill="#ffffff" stroke="#0d9488" stroke-width="1.5" />
    <circle cx="20" cy="20" r="15" fill="url(#galcare_light_grad)" />
    <path d="M20 12v16M12 20h16" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <circle cx="20" cy="20" r="2" fill="#ffffff" />
  </g>

  <!-- Dark Slate Text: Galcare -->
  <text x="52" y="27" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.4" fill="#0f172a">
    Gal<tspan fill="#0d9488">care</tspan>
  </text>

  <!-- Subtitle: Innovation Skin Care -->
  <text x="53" y="41" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8.5" font-weight="600" letter-spacing="0.8" fill="#475569">
